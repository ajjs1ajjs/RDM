name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build Release
      run: dotnet build --configuration Release --no-restore

    - name: Run tests
      run: dotnet test --configuration Release --no-build --verbosity normal

    - name: Publish Single File
      run: |
        dotnet publish RemoteManager.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true /p:PublishTrimmed=false -o ./Build/SingleFile
        Compress-Archive -Path ./Build/SingleFile/* -DestinationPath ./Build/RemoteManager-${{ github.ref_name }}.zip

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: ./Build/RemoteManager-${{ github.ref_name }}.zip
        generate_release_notes: true
